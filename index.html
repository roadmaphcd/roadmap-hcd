<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Roadmap HCD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px #0002; }
        .top-controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        #form-novo { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; border: 1px solid #ddd; }
        input, select { margin: 5px; padding: 8px; width: 160px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #008fa1; color: #fff; }

        /* Estrutura do Painel de Resumos Dinâmico */
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .db-card { 
            background: #fff; padding: 15px; border-radius: 8px; flex: 1; 
            min-width: 160px; box-shadow: 0 2px 5px #0001; border-left: 5px solid #008fa1; 
        }
        .db-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .db-card p { margin: 5px 0 0 0; font-size: 22px; font-weight: bold; color: #333; }
        .db-card span { display: block; font-size: 14px; color: #555; margin-top: 4px; font-weight: 500; }
        
        /* Container para os blocos de Status Dinâmicos */
        #status-container { display: flex; gap: 15px; flex-wrap: wrap; width: 100%; }
    </style>
</head>
<body>
<div class="card">
    <h1>Roadmap HCD</h1>
    
    <div class="top-controls">
        <select id="filtro" onchange="buscar()">
            <option value="Todos">Todos</option>
            <option value="Normando">Normando</option>
            <option value="Aline">Aline</option>
            <option value="Novelli">Novelli</option>
        </select>
        <button style="background: #27ae60;" onclick="buscar()">EXIBIR DADOS</button>
        <button style="background: #008fa1;" onclick="abrirFormNovo()">+ NOVO PROJETO</button>
    </div>
    
    <div class="dashboard">
        <div class="db-card" style="border-left-color: #7f8c8d; min-width: 220px;">
            <h3>Demandas Assumidas</h3>
            <span id="count-normando">Normando: 0 demandas</span>
            <span id="count-aline">Aline: 0 demandas</span>
            <span id="count-novelli">Novelli: 0 demandas</span>
        </div>
        <div id="status-container"></div>
    </div>
    
    <div id="form-novo" data-id="">
        <select id="resp">
            <option value="Normando">Normando</option>
            <option value="Aline">Aline</option>
            <option value="Novelli">Novelli</option>
        </select>
        <input id="proj" placeholder="Projeto">
        <input id="status" placeholder="Status">
        <input id="sol" placeholder="Solicitante"> 
        <input id="desc" placeholder="Descrição">
        <button style="background: #27ae60;" onclick="salvar()">SALVAR</button>
        <button style="background: #7f8c8d;" onclick="document.getElementById('form-novo').style.display = 'none'">CANCELAR</button>
    </div>

    <table id="tb">
        <thead>
            <tr>
                <th>Responsável</th>
                <th>Projeto</th>
                <th>Status</th>
                <th>Solicitante</th>
                <th>Descrição</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxRPI2J33DpLWpfQq8oSd7ALbfXJq1aKqcfy05QAh2luwKlRe7RI7nOIzh8hmUAzmyU/exec";

    function buscar() {
        let filtro = document.getElementById('filtro').value;
        fetch(URL).then(r => r.json()).then(data => {
            let tbody = document.querySelector("#tb tbody");
            tbody.innerHTML = "";
            
            let deves = { "Normando": 0, "Aline": 0, "Novelli": 0 };
            let contagemStatus = {}; 

            data.forEach((row, rawIndex) => {
                // Filtra a linha de títulos de texto caso ela venha do banco
                if (row[0] && (row[0].toLowerCase() === "resp" || row[0].toLowerCase() === "responsável" || row[0].toLowerCase() === "id")) return;

                // Mapeamento correto com base nas colunas do Supabase:
                let idUnico = row[0];       // Coluna 'id' (eu ia)
                let responsavel = row[2];  // Coluna 'resp'
                let projeto = row[3];      // Coluna 'proj'
                let status = row[4];       // Coluna 'status'
                let descricao = row[5];    // Coluna 'descrição'
                let solicitante = row[6];  // Coluna 'Sol'
                let dataBanco = row[1];    // Coluna 'criado_em' ou 'dados' (row[7])

                // 1. Contagem para o Mini Relatório de Status
                let statusDigitado = status ? status.trim() : "";
                if (statusDigitado) {
                    statusDigitado = statusDigitado.charAt(0).toUpperCase() + statusDigitado.slice(1).toLowerCase();
                    contagemStatus[statusDigitado] = (contagemStatus[statusDigitado] || 0) + 1;
                }
                
                // 2. Contagem de demandas por pessoa
                if (responsavel && deves.hasOwnProperty(responsavel)) {
                    deves[responsavel]++;
                }

                // 3. Formatação amigável da Data brasileira
                let dataFormatada = "-";
                if (dataBanco) {
                    try {
                        let dataObj = new Date(dataBanco);
                        if (!isNaN(dataObj)) {
                            dataFormatada = dataObj.toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                        } else {
                            dataFormatada = dataBanco;
                        }
                    } catch(e) {
                        dataFormatada = dataBanco;
                    }
                }

                // 4. Monta as linhas visuais da tabela obedecendo o filtro por pessoa
                if (filtro === "Todos" || responsavel === filtro) {
                    let rowData = JSON.stringify(row).replace(/"/g, '&quot;');
                    
                    tbody.innerHTML += `<tr>
                        <td>${responsavel || ""}</td>
                        <td>${projeto || ""}</td>
                        <td>${status || ""}</td>
                        <td>${solicitante || ""}</td>
                        <td>${descricao || ""}</td>
                        <td>${dataFormatada}</td>
                        <td>
                            <button style="background: #2980b9; padding: 6px 12px; font-size: 13px;" onclick="editar('${idUnico}', '${rowData}')">Editar</button>
                        </td>
                    </tr>`;
                }
            });

            // Atualiza as caixas de demandas individuais
            document.getElementById('count-normando').innerText = `Normando: ${deves["Normando"]} demandas`;
            document.getElementById('count-aline').innerText = `Aline: ${deves["Aline"]} demandas`;
            document.getElementById('count-novelli').innerText = `Novelli: ${deves["Novelli"]} demandas`;

            // Gerador automático de blocos de Status
            let containerStatus = document.getElementById('status-container');
            containerStatus.innerHTML = ""; 

            const obterCorBorda = (nome) => {
                let n = nome.toLowerCase();
                if (n.includes('conclui') || n.includes('finaliza')) return '#2e7d32';
                if (n.includes('andamento') || n.includes('execu')) return '#008fa1';
                if (n.includes('descontin') || n.includes('cancela') || n.includes('parado')) return '#c0392b';
                if (n.includes('aguarda') || n.includes('espera')) return '#f57c00';
                return '#9b59b6';
            };

            for (let statusName in contagemStatus) {
                let corBorda = obterCorBorda(statusName);
                containerStatus.innerHTML += `
                    <div class="db-card" style="border-left-color: ${corBorda};">
                        <h3>${statusName}</h3>
                        <p>${contagemStatus[statusName]}</p>
                    </div>
                `;
            }
        });
    }

    function abrirFormNovo() {
        let form = document.getElementById('form-novo');
        form.setAttribute('data-id', ''); // Limpa o ID para indicar inserção de novo projeto
        document.getElementById('proj').value = '';
        document.getElementById('status').value = '';
        document.getElementById('sol').value = '';
        document.getElementById('desc').value = '';
        form.style.display = 'block';
    }

    function editar(id, dadosString) {
        let dados = JSON.parse(dadosString.replace(/&quot;/g, '"'));
        let form = document.getElementById('form-novo');
        
        form.setAttribute('data-id', id); // Armazena o ID real e único do banco de dados
        document.getElementById('resp').value = dados[2] || "";
        document.getElementById('proj').value = dados[3] || "";
        document.getElementById('status').value = dados[4] || "";
        document.getElementById('desc').value = dados[5] || ""; 
        document.getElementById('sol').value = dados[6] || "";
        
        form.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function salvar() {
        let form = document.getElementById('form-novo');
        let idExistente = form.getAttribute('data-id');
        
        // Se houver ID guardado, define como edição ('edit'), senão criação ('add')
        let acao = (idExistente && idExistente !== "") ? 'edit' : 'add';

        let params = new URLSearchParams({
            action: acao,
            row: idExistente, // Passa o ID único para a API do Apps Script localizar o registro correto
            resp: document.getElementById('resp').value,
            proj: document.getElementById('proj').value,
            status: document.getElementById('status').value,
            sol: document.getElementById('sol').value,
            desc: document.getElementById('desc').value,
            data: new Date().toISOString()
        });

        fetch(URL + "?" + params).then(() => { 
            form.style.display = 'none';
            form.setAttribute('data-id', ''); 
            buscar(); 
        });
    }

    window.onload = buscar;
</script>
</body>
</html>
