<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap HCD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px #0002; }
        .top-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .add { background: #008fa1; }
        .exibir { background: #27ae60; }
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; white-space: nowrap; }
        th { background: #008fa1; color: #fff; }
    </style>
</head>
<body>
<div class="card">
    <h1>Roadmap HCD</h1>
    <div class="top-controls">
        <button class="exibir" onclick="buscar()">EXIBIR DADOS</button>
        <button class="add" onclick="novo()">+ NOVO PROJETO</button>
    </div>
    <div class="table-container">
        <table id="tb">
            <thead><tr><th>RESPONSÁVEL</th><th>PROJETO</th><th>STATUS</th><th>SOLICITADO POR</th><th>DATA</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbx0FpRDz-6U1DfTy2U2lYIGGWyhws72MA1Rm1fycJvegxOcibkZcgV_VVLDblVQVq7g/exec";

    function buscar() {
        fetch(URL)
            .then(res => res.json())
            .then(data => {
                let tbody = document.querySelector("#tb tbody");
                tbody.innerHTML = "";
                data.forEach(row => {
                    tbody.innerHTML += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`;
                });
            });
    }

    function novo() {
        let resp = prompt("Responsável:");
        let proj = prompt("Projeto:");
        let status = prompt("Status:");
        let sol = prompt("Solicitado por:");
        let data = new Date().toLocaleDateString();

        if(resp && proj) {
            let dados = `?resp=${resp}&proj=${proj}&status=${status}&sol=${sol}&data=${data}`;
            fetch(URL + dados).then(() => {
                alert("Salvo com sucesso!");
                buscar();
            });
        }
    }
</script>
</body>
</html>
