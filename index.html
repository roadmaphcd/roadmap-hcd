<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Roadmap HCD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px #0002; }
        .top-controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        #form-novo { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; border: 1px solid #ddd; }
        input, select { margin: 5px; padding: 8px; width: 160px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #008fa1; color: #fff; }

        /* Estilos do Novo Dashboard (Mini Relatório) */
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .db-card { 
            background: #fff; padding: 15px; border-radius: 8px; flex: 1; 
            min-width: 180px; box-shadow: 0 2px 5px #0001; border-left: 5px solid #008fa1; 
        }
        .db-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .db-card p { margin: 5px 0 0 0; font-size: 22px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h1>Roadmap HCD</h1>
    
    <div class="top-controls">
        <select id="filtro" onchange="buscar()">
            <option value="Todos">Todos</option>
            <option value="Normando">Normando</option>
            <option value="Aline">Aline</option>
            <option value="Novelli">Novelli</option>
        </select>
        <button style="background: #27ae60;" onclick="buscar()">EXIBIR DADOS</button>
        <button style="background: #008fa1;" onclick="abrirFormNovo()">+ NOVO PROJETO</button>
    </div>
    
    <!-- DASHBOARD DE METRICAS (Exibe o resumo automático do banco de dados) -->
    <div class="dashboard">
        <div class="db-card" style="border-left-color: #008fa1;">
            <h3>Total de Demandas</h3>
            <p id="total-demandas">0</p>
        </div>
        <div class="db-card" style="border-left-color: #2e7d32;">
            <h3>Concluídas</h3>
            <p id="total-concluidas">0</p>
        </div>
        <div class="db-card" style="border-left-color: #f57c00;">
            <h3>Líder de Demandas</h3>
            <p id="lider-demandas" style="font-size: 18px; margin-top: 8px;">-</p>
        </div>
    </div>
    
    <!-- Formulário adaptado para receber Edição e Criação -->
    <div id="form-novo" data-row="">
        <select id="resp">
            <option value="Normando">Normando</option>
            <option value="Aline">Aline</option>
            <option value="Novelli">Novelli</option>
        </select>
        <input id="proj" placeholder="Projeto">
        <input id="status" placeholder="Status">
        <input id="desc" placeholder="Descrição">
        <input id="sol" placeholder="Solicitante"> 
        <button style="background: #27ae60;" onclick="salvar()">SALVAR</button>
        <button style="background: #7f8c8d;" onclick="document.getElementById('form-novo').style.display = 'none'">CANCELAR</button>
    </div>

    <table id="tb">
        <thead><tr><th>Resp</th><th>Projeto</th><th>Status</th><th>Desc</th><th>Sol</th><th>Data</th><th>Ações</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxRPI2J33DpLWpfQq8oSd7ALbfXJq1aKqcfy05QAh2luwKlRe7RI7nOIzh8hmUAzmyU/exec";

    function buscar() {
        let filtro = document.getElementById('filtro').value;
        fetch(URL).then(r => r.json()).then(data => {
            let tbody = document.querySelector("#tb tbody");
            tbody.innerHTML = "";
            
            // Variáveis para calcular o relatório dinamicamente
            let totalGeral = data.length - 1; // Desconta a linha do cabeçalho
            let totalConcluidas = 0;
            let contagemResponsaveis = {};

            data.slice(1).forEach((row, index) => {
                let linhaReal = index + 2; 

                // Lógica de cálculo do relatório (Baseado em TODOS os dados do banco)
                if (row[2] && (row[2].toLowerCase() === "concluído" || row[2].toLowerCase() === "concluido")) {
                    totalConcluidas++;
                }
                let responsavel = row[0];
                if (responsavel) {
                    contagemResponsaveis[responsavel] = (contagemResponsaveis[responsavel] || 0) + 1;
                }

                // Renderização das linhas na tabela baseada no filtro selecionado
                if (filtro === "Todos" || row[0] === filtro) {
                    let rowData = JSON.stringify(row).replace(/"/g, '&quot;');
                    
                    tbody.innerHTML += `<tr>
                        <td>${row[0]}</td>
                        <td>${row[1]}</td>
                        <td>${row[2]}</td>
                        <td>${row[3]}</td>
                        <td>${row[4]}</td>
                        <td>${row[5]}</td>
                        <td>
                            <button style="background: #2980b9; margin-right: 5px; padding: 6px 10px; font-size: 13px;" onclick="editar(${linhaReal}, '${rowData}')">Editar</button>
                            <button style="background: #c0392b; padding: 6px 10px; font-size: 13px;" onclick="excluir(${linhaReal})">Excluir</button>
                        </td>
                    </tr>`;
                }
            });

            // Descobrir quem é o líder de demandas no objeto acumulado
            let liderNome = "-";
            let liderMax = 0;
            for (let pessoa in contagemResponsaveis) {
                if (contagemResponsaveis[pessoa] > liderMax) {
                    liderMax = contagemResponsaveis[pessoa];
                    liderNome = `${pessoa} (${liderMax})`;
                }
            }

            // Atualiza os componentes visuais do Mini Relatório na tela
            document.getElementById('total-demandas').innerText = totalGeral < 0 ? 0 : totalGeral;
            document.getElementById('total-concluidas').innerText = totalConcluidas;
            document.getElementById('lider-demandas').innerText = liderNome;
        });
    }

    function abrirFormNovo() {
        let form = document.getElementById('form-novo');
        form.setAttribute('data-row', ''); // Indica que é um novo registro
        document.getElementById('proj').value = '';
        document.getElementById('status').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('sol').value = '';
        form.style.display = 'block';
    }

    function editar(linha, dadosString) {
        let dados = JSON.parse(dadosString.replace(/&quot;/g, '"'));
        let form = document.getElementById('form-novo');
        
        form.setAttribute('data-row', linha); // Guarda a linha que está sendo editada
        document.getElementById('resp').value = dados[0];
        document.getElementById('proj').value = dados[1];
        document.getElementById('status').value = dados[2];
        document.getElementById('desc').value = dados[3];
        document.getElementById('sol').value = dados[4];
        
        form.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' }); // Sobe a página suavemente até o formulário
    }

    function salvar() {
        let form = document.getElementById('form-novo');
        let linhaExistente = form.getAttribute('data-row');
        let acao = linhaExistente ? 'edit' : 'add';

        let params = new URLSearchParams({
            action: acao,
            row: linhaExistente,
            resp: document.getElementById('resp').value,
            proj: document.getElementById('proj').value,
            status: document.getElementById('status').value,
            desc: document.getElementById('desc').value,
            sol: document.getElementById('sol').value,
            data: new Date().toLocaleDateString()
        });

        fetch(URL + "?" + params).then(() => { 
            form.style.display = 'none';
            form.setAttribute('data-row', '');
            buscar(); 
        });
    }

    function excluir(row) {
        if(confirm("Confirmar exclusão?")) {
            fetch(URL + "?action=delete&row=" + row).then(() => buscar());
        }
    }

    // Executa uma busca automática ao carregar a página pela primeira vez
    window.onload = buscar;
</script>
</body>
</html>
