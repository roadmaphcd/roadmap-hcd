<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Roadmap HCD Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px #0002; }
        h1 { color: #008fa1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #008fa1; color: #fff; }
        button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .del { background: #c0392b; color: #fff; }
    </style>
</head>
<body>
<div class="card">
    <h1>Roadmap HCD</h1>
    <select id="filtro">
        <option value="Todos">Todos</option>
        <option value="Normando">Normando</option>
        <option value="Aline">Aline</option>
        <option value="Novelli">Novelli</option>
    </select>
    <button onclick="carregarDados()">EXIBIR</button>
    <button onclick="novoProjeto()">+ Projeto</button>
    <table id="tb">
        <thead><tr><th>Responsável</th><th>Projeto</th><th>Status</th><th>Descrição</th><th>Solicitante</th><th>Data</th><th>Ações</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // Configuração com sua chave pública encontrada em image_5f749b.png
    const supabase = supabase.createClient(
        'https://qwsaepwvxxihlqqmlsqa.supabase.co', 
        'sb_publishable_6kcIfh-2NLViN8WYhxfCgG_GJ1US_i_j3xXj2S7XW4'
    );

    async function carregarDados() {
        let f = document.getElementById("filtro").value;
        let query = supabase.from('roadmap').select('*');
        if (f !== "Todos") query = query.eq('resp', f);
        
        let { data } = await query;
        let tbody = document.querySelector("#tb tbody");
        tbody.innerHTML = "";
        (data || []).forEach(x => {
            tbody.innerHTML += `<tr>
                <td>${x.resp}</td><td>${x.proj}</td><td>${x.status}</td><td>${x.desc}</td><td>${x.sol}</td><td>${x.data}</td>
                <td><button class="del" onclick="excluir(${x.id})">Excluir</button></td>
            </tr>`;
        });
    }

    async function novoProjeto() {
        await supabase.from('roadmap').insert([{ 
            resp: 'Normando', proj: 'Novo Projeto', status: 'Iniciado', 
            data: new Date().toISOString().split('T')[0] 
        }]);
        carregarDados();
    }

    async function excluir(id) {
        if (confirm("Excluir projeto?")) {
            await supabase.from('roadmap').delete().eq('id', id);
            carregarDados();
        }
    }

    carregarDados();
</script>
</body>
</html>
